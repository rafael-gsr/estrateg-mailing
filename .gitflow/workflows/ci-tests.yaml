name: Testing application
on: [push]
jobs:
  test-application:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      - uses: actions/checkout@v4  
      - name: Setup node
        uses: actions/setup-node@v4
        with:
            node-version: 20.x
      - name: Run tests
        run: |
          yarn ci
          yarn test
~                         
